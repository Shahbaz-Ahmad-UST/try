name: CI for UI and API Automation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ui-tests:
    name: UI Automation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: UIAutomation

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: UIAutomation/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        env:
          CI: true
          BASEURL: https://tripstack.doomple.com/
          CUSTOMER_EMAIL: 'chetan@tripstack.test'
          CUSTOMER_PASSWORD: 'Password@123'
          PASSENGER_FIRST_NAME: 'Shah'
          PASSENGER_LAST_NAME: 'Ahmad'
          PASSENGER_AGE: 20
          PASSENGER_GENDER: Male
          PASSENGER_EMAIL: chetan@tripstack.test
          PASSENGER_PHONE: '1234567890'
          CARD_NAME_ON_CARD: 'Shah'
          CARD_NUMBER: '1234567891234567'
          CARD_EXPIRY: '11/11'
          CARD_CVV: '123'
        run: npx playwright test

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: UIAutomation/playwright-report/
          if-no-files-found: warn

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: UIAutomation/test-results/
          if-no-files-found: warn

  performance-tests:
    name: Performance Tests (k6)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: UIAutomation

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo apt-get update
          sudo apt-get install -y gnupg software-properties-common
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Verify k6 Installation
        run: k6 version

      - name: Run k6 Performance Test
        run: |
          k6 run performance/checkout-load.js

  api-tests:
    name: API Automation Tests (Maven)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: APIAutomationFinal

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rajasoN@0073
          MYSQL_DATABASE: tripstack
        ports:
          - 3306:3306

    env:
      CI: true
      BASE_URL: https://tripstack.doomple.com/
      CUSTOMER_MAIL: chetan@tripstack.test
      CUSTOMER_PASSWORD: Password@123
      TEST_USE_TESTCONTAINERS: "true"
      DB_PASSWORD: rajasoN@0073
      DB_JDBC_URL: jdbc:mysql://localhost:3306/tripstack
      DB_USER: root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Wait for MySQL service container
        run: |
          for i in $(seq 1 20); do
            mysqladmin ping -h127.0.0.1 -P3306 -uroot -p"$DB_PASSWORD" --silent && break
            echo "waiting for mysql... ($i)"
            sleep 3
          done

      - name: Apply bookings schema
        run: |
          mysql -h127.0.0.1 -P3306 -uroot -p"$DB_PASSWORD" tripstack < src/test/resources/db/migration/V1__init_bookings.sql

      - name: Run tests
        run: mvn -B clean test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: APIAutomationFinal/target/surefire-reports/
          if-no-files-found: warn